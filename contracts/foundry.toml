[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
verbosity = 2
gas_reports = ["*"]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 100 }
verbosity = 3

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
quote_style = "double"
int_types = "long"

[rpc_endpoints]
mantle = "${MANTLE_MAINNET_RPC}"
mantle_sepolia = "${MANTLE_SEPOLIA_RPC}"

[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api" }
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://sepolia-api.mantlescan.xyz/api" }
